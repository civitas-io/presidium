<svg viewBox="0 0 780 420" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">

  <!-- Title -->
  <text x="390" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#E5E7EB">Build vs. Wrap</text>
  <text x="390" y="48" text-anchor="middle" font-size="11" fill="#9CA3AF">Existing products as adapters, novel components as reference implementations</text>

  <!-- Column headers -->
  <text x="200" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#A78BFA">Presidium Interface</text>
  <text x="460" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#60A5FA">Existing Products (Wrap)</text>
  <text x="680" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#F59E0B">Novel (Build)</text>

  <!-- Divider -->
  <line x1="30" y1="90" x2="750" y2="90" stroke="#374151" stroke-width="1"/>

  <!-- Row 1: Policy Engine -->
  <rect x="60" y="100" width="280" height="36" rx="6" fill="#4C1D95"/>
  <text x="200" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="white">PolicyEngine</text>
  <text x="200" y="131" text-anchor="middle" font-size="8" fill="#DDD6FE">evaluate(action) -> PolicyDecision</text>

  <rect x="360" y="100" width="80" height="36" rx="6" fill="#1E40AF"/>
  <text x="400" y="122" text-anchor="middle" font-size="10" font-weight="600" fill="white">OPA</text>

  <rect x="450" y="100" width="80" height="36" rx="6" fill="#1E40AF"/>
  <text x="490" y="122" text-anchor="middle" font-size="10" font-weight="600" fill="white">Cedar</text>

  <rect x="610" y="100" width="130" height="36" rx="6" fill="#2D6A4F"/>
  <text x="675" y="118" text-anchor="middle" font-size="10" font-weight="600" fill="white">CEL (default)</text>
  <text x="675" y="131" text-anchor="middle" font-size="7" fill="#D1FAE5">built into core</text>

  <!-- Row 2: Credentials -->
  <rect x="60" y="146" width="280" height="36" rx="6" fill="#4C1D95"/>
  <text x="200" y="164" text-anchor="middle" font-size="11" font-weight="600" fill="white">CredentialProvider</text>
  <text x="200" y="177" text-anchor="middle" font-size="8" fill="#DDD6FE">get(agent, provider) -> secret</text>

  <rect x="360" y="146" width="80" height="36" rx="6" fill="#1E40AF"/>
  <text x="400" y="168" text-anchor="middle" font-size="10" font-weight="600" fill="white">Vault</text>

  <rect x="450" y="146" width="105" height="36" rx="6" fill="#1E40AF"/>
  <text x="502" y="168" text-anchor="middle" font-size="10" font-weight="600" fill="white">AWS Secrets</text>

  <rect x="610" y="146" width="130" height="36" rx="6" fill="#2D6A4F"/>
  <text x="675" y="164" text-anchor="middle" font-size="10" font-weight="600" fill="white">Env / File</text>
  <text x="675" y="177" text-anchor="middle" font-size="7" fill="#D1FAE5">built into core</text>

  <!-- Row 3: LLM Gateway -->
  <rect x="60" y="192" width="280" height="36" rx="6" fill="#4C1D95"/>
  <text x="200" y="210" text-anchor="middle" font-size="11" font-weight="600" fill="white">GovernedModelProvider</text>
  <text x="200" y="223" text-anchor="middle" font-size="8" fill="#DDD6FE">chat() with grants + rate limits</text>

  <rect x="360" y="192" width="80" height="36" rx="6" fill="#1E40AF"/>
  <text x="400" y="214" text-anchor="middle" font-size="10" font-weight="600" fill="white">LiteLLM</text>

  <rect x="450" y="192" width="80" height="36" rx="6" fill="#1E40AF"/>
  <text x="490" y="214" text-anchor="middle" font-size="10" font-weight="600" fill="white">Portkey</text>

  <rect x="610" y="192" width="130" height="36" rx="6" fill="#374151" stroke="#6B7280" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="675" y="214" text-anchor="middle" font-size="9" fill="#9CA3AF">in-process checks</text>

  <!-- Row 4: HITL -->
  <rect x="60" y="238" width="280" height="36" rx="6" fill="#4C1D95"/>
  <text x="200" y="256" text-anchor="middle" font-size="11" font-weight="600" fill="white">ApprovalService</text>
  <text x="200" y="269" text-anchor="middle" font-size="8" fill="#DDD6FE">request_approval() -> approved | denied</text>

  <rect x="360" y="238" width="80" height="36" rx="6" fill="#1E40AF"/>
  <text x="400" y="260" text-anchor="middle" font-size="10" font-weight="600" fill="white">Slack</text>

  <rect x="450" y="238" width="105" height="36" rx="6" fill="#1E40AF"/>
  <text x="502" y="260" text-anchor="middle" font-size="10" font-weight="600" fill="white">Temporal</text>

  <rect x="610" y="238" width="130" height="36" rx="6" fill="#2D6A4F"/>
  <text x="675" y="256" text-anchor="middle" font-size="10" font-weight="600" fill="white">Callback</text>
  <text x="675" y="269" text-anchor="middle" font-size="7" fill="#D1FAE5">built into core</text>

  <!-- Row 5: Agent Registry — NOVEL -->
  <rect x="60" y="284" width="280" height="36" rx="6" fill="#4C1D95"/>
  <text x="200" y="302" text-anchor="middle" font-size="11" font-weight="600" fill="white">AgentRegistry</text>
  <text x="200" y="315" text-anchor="middle" font-size="8" fill="#DDD6FE">register() + grants + trust scores</text>

  <rect x="360" y="284" width="175" height="36" rx="6" fill="#374151" stroke="#6B7280" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="447" y="306" text-anchor="middle" font-size="9" fill="#6B7280">no existing product</text>

  <rect x="610" y="284" width="130" height="36" rx="6" fill="#B45309"/>
  <text x="675" y="302" text-anchor="middle" font-size="10" font-weight="600" fill="white">Postgres Reg.</text>
  <text x="675" y="315" text-anchor="middle" font-size="7" fill="#FDE68A">reference impl</text>

  <!-- Row 6: MCP Governance — NOVEL -->
  <rect x="60" y="330" width="280" height="36" rx="6" fill="#4C1D95"/>
  <text x="200" y="348" text-anchor="middle" font-size="11" font-weight="600" fill="white">GovernedToolProvider</text>
  <text x="200" y="361" text-anchor="middle" font-size="8" fill="#DDD6FE">ACLs + poisoning detection</text>

  <rect x="360" y="330" width="175" height="36" rx="6" fill="#374151" stroke="#6B7280" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="447" y="352" text-anchor="middle" font-size="9" fill="#6B7280">MCP too new</text>

  <rect x="610" y="330" width="130" height="36" rx="6" fill="#B45309"/>
  <text x="675" y="348" text-anchor="middle" font-size="10" font-weight="600" fill="white">MCP Gov.</text>
  <text x="675" y="361" text-anchor="middle" font-size="7" fill="#FDE68A">reference impl</text>

  <!-- Row 7: Trust Scorer — NOVEL -->
  <rect x="60" y="376" width="280" height="36" rx="6" fill="#4C1D95"/>
  <text x="200" y="394" text-anchor="middle" font-size="11" font-weight="600" fill="white">TrustScorer</text>
  <text x="200" y="407" text-anchor="middle" font-size="8" fill="#DDD6FE">score(agent) -> trust_score</text>

  <rect x="360" y="376" width="175" height="36" rx="6" fill="#374151" stroke="#6B7280" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="447" y="398" text-anchor="middle" font-size="9" fill="#6B7280">novel concept</text>

  <rect x="610" y="376" width="130" height="36" rx="6" fill="#B45309"/>
  <text x="675" y="394" text-anchor="middle" font-size="10" font-weight="600" fill="white">Learning Scorer</text>
  <text x="675" y="407" text-anchor="middle" font-size="7" fill="#FDE68A">reference impl</text>
</svg>