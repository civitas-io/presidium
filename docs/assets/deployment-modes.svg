<svg viewBox="0 0 780 380" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9CA3AF"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="390" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#E5E7EB">Deployment Modes</text>
  <text x="390" y="48" text-anchor="middle" font-size="11" fill="#9CA3AF">Same interface, different deployment — library or service</text>

  <!-- ═══ LIBRARY MODE (left) ═══ -->
  <rect x="20" y="70" width="350" height="290" rx="10" fill="#111827" stroke="#2D6A4F" stroke-width="2"/>
  <text x="195" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#86EFAC">Library Mode</text>
  <text x="195" y="112" text-anchor="middle" font-size="10" fill="#9CA3AF">Single process, everything in-process</text>

  <!-- Process boundary -->
  <rect x="40" y="125" width="310" height="220" rx="8" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="195" y="142" text-anchor="middle" font-size="9" fill="#6B7280">Python Process</text>

  <!-- Agent -->
  <rect x="60" y="155" width="120" height="40" rx="6" fill="#2D6A4F"/>
  <text x="120" y="172" text-anchor="middle" font-size="10" font-weight="600" fill="white">AgentProcess</text>
  <text x="120" y="186" text-anchor="middle" font-size="8" fill="#D1FAE5">handle()</text>

  <!-- Civitas Runtime -->
  <rect x="60" y="205" width="120" height="34" rx="6" fill="#1E3A5F"/>
  <text x="120" y="222" text-anchor="middle" font-size="9" font-weight="600" fill="white">Civitas Runtime</text>
  <text x="120" y="233" text-anchor="middle" font-size="7" fill="#93C5FD">Supervisor + Bus</text>

  <!-- CEL Policy (in-process) -->
  <rect x="200" y="155" width="130" height="34" rx="6" fill="#4C1D95"/>
  <text x="265" y="172" text-anchor="middle" font-size="9" font-weight="600" fill="white">CelPolicyEngine</text>
  <text x="265" y="184" text-anchor="middle" font-size="7" fill="#DDD6FE">in-process, ~1 us</text>

  <!-- SQLite Registry (in-process) -->
  <rect x="200" y="198" width="130" height="34" rx="6" fill="#4C1D95"/>
  <text x="265" y="215" text-anchor="middle" font-size="9" font-weight="600" fill="white">SqliteRegistry</text>
  <text x="265" y="227" text-anchor="middle" font-size="7" fill="#DDD6FE">local file</text>

  <!-- Env Credentials -->
  <rect x="200" y="241" width="130" height="34" rx="6" fill="#4C1D95"/>
  <text x="265" y="258" text-anchor="middle" font-size="9" font-weight="600" fill="white">EnvCredentials</text>
  <text x="265" y="270" text-anchor="middle" font-size="7" fill="#DDD6FE">os.environ</text>

  <!-- Rule Trust -->
  <rect x="200" y="284" width="130" height="34" rx="6" fill="#4C1D95"/>
  <text x="265" y="301" text-anchor="middle" font-size="9" font-weight="600" fill="white">RuleTrustScorer</text>
  <text x="265" y="313" text-anchor="middle" font-size="7" fill="#DDD6FE">stateless rules</text>

  <!-- Arrows: Agent → governance -->
  <line x1="180" y1="170" x2="198" y2="170" stroke="#9CA3AF" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="180" y1="180" x2="198" y2="213" stroke="#9CA3AF" stroke-width="1.0" marker-end="url(#arr)"/>

  <!-- ═══ SERVICE MODE (right) ═══ -->
  <rect x="410" y="70" width="350" height="290" rx="10" fill="#111827" stroke="#4A1942" stroke-width="2"/>
  <text x="585" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#D8B4FE">Service Mode</text>
  <text x="585" y="112" text-anchor="middle" font-size="10" fill="#9CA3AF">Distributed, shared state</text>

  <!-- Process 1 -->
  <rect x="430" y="125" width="150" height="130" rx="8" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="505" y="142" text-anchor="middle" font-size="9" fill="#6B7280">Agent Process</text>

  <rect x="445" y="155" width="120" height="40" rx="6" fill="#2D6A4F"/>
  <text x="505" y="172" text-anchor="middle" font-size="10" font-weight="600" fill="white">AgentProcess</text>
  <text x="505" y="186" text-anchor="middle" font-size="8" fill="#D1FAE5">handle()</text>

  <rect x="445" y="205" width="120" height="34" rx="6" fill="#1E3A5F"/>
  <text x="505" y="222" text-anchor="middle" font-size="9" font-weight="600" fill="white">Civitas Runtime</text>
  <text x="505" y="233" text-anchor="middle" font-size="7" fill="#93C5FD">NATS transport</text>

  <!-- Process 2: Services -->
  <rect x="600" y="125" width="145" height="220" rx="8" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="672" y="142" text-anchor="middle" font-size="9" fill="#6B7280">Governance Services</text>

  <!-- OPA service -->
  <rect x="615" y="155" width="115" height="30" rx="5" fill="#5B21B6"/>
  <text x="672" y="174" text-anchor="middle" font-size="9" font-weight="600" fill="white">OPA PolicyEngine</text>

  <!-- Postgres Registry -->
  <rect x="615" y="195" width="115" height="30" rx="5" fill="#5B21B6"/>
  <text x="672" y="214" text-anchor="middle" font-size="9" font-weight="600" fill="white">Postgres Registry</text>

  <!-- Vault -->
  <rect x="615" y="235" width="115" height="30" rx="5" fill="#5B21B6"/>
  <text x="672" y="254" text-anchor="middle" font-size="9" font-weight="600" fill="white">Vault Credentials</text>

  <!-- Learning Trust -->
  <rect x="615" y="275" width="115" height="30" rx="5" fill="#5B21B6"/>
  <text x="672" y="294" text-anchor="middle" font-size="9" font-weight="600" fill="white">Learning Trust</text>

  <!-- Arrows: Agent → services (over network) -->
  <line x1="567" y1="170" x2="613" y2="170" stroke="#D8B4FE" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,3"/>
  <line x1="567" y1="180" x2="613" y2="210" stroke="#D8B4FE" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="4,3"/>
  <text x="590" y="162" text-anchor="middle" font-size="7" fill="#9CA3AF">NATS / HTTP</text>

  <!-- ═══ SAME INTERFACE CALLOUT ═══ -->
  <rect x="260" y="360" width="260" height="16" rx="4" fill="#1F2937"/>
  <text x="390" y="373" text-anchor="middle" font-size="10" font-weight="600" fill="#D1D5DB">Same PolicyEngine protocol both sides</text>
</svg>