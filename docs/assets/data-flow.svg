<svg viewBox="0 0 780 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9CA3AF"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#86EFAC"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#F87171"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#FCD34D"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="300" fill="#111827" rx="10"/>

  <!-- Agent Request -->
  <rect x="16" y="118" width="108" height="44" fill="#2D6A4F" rx="6"/>
  <text x="70" y="136" text-anchor="middle" fill="#E5E7EB" font-size="12" font-weight="600">Agent</text>
  <text x="70" y="153" text-anchor="middle" fill="#86EFAC" font-size="11">Request</text>

  <!-- Arrow: Agent → Registry -->
  <line x1="124" y1="140" x2="148" y2="140" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Registry Lookup -->
  <rect x="148" y="118" width="108" height="44" fill="#1E3A5F" rx="6"/>
  <text x="202" y="136" text-anchor="middle" fill="#E5E7EB" font-size="12" font-weight="600">Registry</text>
  <text x="202" y="153" text-anchor="middle" fill="#60A5FA" font-size="11">Lookup</text>

  <!-- Arrow: Registry → Policy -->
  <line x1="256" y1="140" x2="280" y2="140" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- CEL Policy Check diamond -->
  <polygon points="330,110 380,140 330,170 280,140" fill="#4C1D95" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="330" y="136" text-anchor="middle" fill="#E5E7EB" font-size="10" font-weight="600">CEL Policy</text>
  <text x="330" y="150" text-anchor="middle" fill="#A78BFA" font-size="9">in-process</text>

  <!-- Inline note -->
  <rect x="270" y="76" width="220" height="26" fill="#1F2937" rx="4" stroke="#374151" stroke-width="1"/>
  <text x="380" y="93" text-anchor="middle" fill="#9CA3AF" font-size="9.5" font-style="italic">CEL evaluation happens inline — no external call</text>
  <line x1="330" y1="110" x2="330" y2="102" stroke="#374151" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ALLOW branch: right from diamond -->
  <line x1="380" y1="140" x2="420" y2="140" stroke="#86EFAC" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="400" y="133" text-anchor="middle" fill="#86EFAC" font-size="9.5">ALLOW</text>

  <!-- Execute via Civitas -->
  <rect x="420" y="118" width="120" height="44" fill="#1E3A5F" rx="6"/>
  <text x="480" y="136" text-anchor="middle" fill="#E5E7EB" font-size="11" font-weight="600">Execute via</text>
  <text x="480" y="152" text-anchor="middle" fill="#60A5FA" font-size="11">Civitas</text>

  <!-- Three sub-paths from Execute -->
  <!-- LLM call -->
  <line x1="540" y1="128" x2="570" y2="128" stroke="#9CA3AF" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="570" y="112" width="140" height="24" fill="#1F2937" rx="4" stroke="#374151" stroke-width="1"/>
  <text x="640" y="128" text-anchor="middle" fill="#9CA3AF" font-size="9.5">LLM call → GovernedModelProvider</text>

  <!-- Tool call -->
  <line x1="540" y1="140" x2="570" y2="140" stroke="#9CA3AF" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="570" y="130" width="140" height="24" fill="#1F2937" rx="4" stroke="#374151" stroke-width="1"/>
  <text x="640" y="146" text-anchor="middle" fill="#9CA3AF" font-size="9.5">Tool call → GovernedToolProvider</text>

  <!-- Message -->
  <line x1="540" y1="152" x2="570" y2="152" stroke="#9CA3AF" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="570" y="148" width="140" height="24" fill="#1F2937" rx="4" stroke="#374151" stroke-width="1"/>
  <text x="640" y="164" text-anchor="middle" fill="#9CA3AF" font-size="9.5">Message → MessageBus → Agent</text>

  <!-- DENY branch: down from diamond -->
  <line x1="330" y1="170" x2="330" y2="210" stroke="#F87171" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="340" y="196" fill="#F87171" font-size="9.5">DENY</text>

  <!-- Error box -->
  <rect x="270" y="210" width="120" height="36" fill="#1F2937" rx="6" stroke="#7F1D1D" stroke-width="1"/>
  <text x="330" y="226" text-anchor="middle" fill="#F87171" font-size="11" font-weight="600">Error</text>
  <text x="330" y="240" text-anchor="middle" fill="#9CA3AF" font-size="9.5">to agent, logged</text>

  <!-- REQUIRE_APPROVAL branch: up from diamond -->
  <line x1="330" y1="110" x2="330" y2="56" stroke="#FCD34D" stroke-width="1.5"/>
  <line x1="330" y1="56" x2="440" y2="56" stroke="#FCD34D" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="340" y="48" fill="#FCD34D" font-size="9.5">REQUIRE_APPROVAL</text>

  <!-- ApprovalService -->
  <rect x="440" y="38" width="120" height="36" fill="#1F2937" rx="6" stroke="#B45309" stroke-width="1"/>
  <text x="500" y="54" text-anchor="middle" fill="#FCD34D" font-size="11" font-weight="600">ApprovalService</text>
  <text x="500" y="68" text-anchor="middle" fill="#9CA3AF" font-size="9.5">Human review</text>

  <!-- Converge lines to AuditEnricher -->
  <!-- From sub-paths (right side) down -->
  <line x1="710" y1="136" x2="730" y2="136" stroke="#9CA3AF" stroke-width="1.2"/>
  <line x1="730" y1="136" x2="730" y2="258" stroke="#9CA3AF" stroke-width="1.2"/>
  <line x1="730" y1="258" x2="660" y2="258" stroke="#9CA3AF" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- From Error box -->
  <line x1="330" y1="246" x2="330" y2="258" stroke="#9CA3AF" stroke-width="1.2"/>
  <line x1="330" y1="258" x2="560" y2="258" stroke="#9CA3AF" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- From ApprovalService -->
  <line x1="560" y1="56" x2="580" y2="56" stroke="#9CA3AF" stroke-width="1.2"/>
  <line x1="580" y1="56" x2="580" y2="258" stroke="#9CA3AF" stroke-width="1.2"/>
  <line x1="580" y1="258" x2="660" y2="258" stroke="#9CA3AF" stroke-width="1.2"/>

  <!-- AuditEnricher + OTEL -->
  <rect x="560" y="240" width="100" height="36" fill="#1F2937" rx="6" stroke="#374151" stroke-width="1"/>
  <text x="610" y="256" text-anchor="middle" fill="#E5E7EB" font-size="10" font-weight="600">AuditEnricher</text>
  <text x="610" y="270" text-anchor="middle" fill="#9CA3AF" font-size="9.5">→ OTEL</text>
</svg>
