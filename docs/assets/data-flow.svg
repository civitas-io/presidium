<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 530" width="820" height="530"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9CA3AF"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22C55E"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#EF4444"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#F59E0B"/>
    </marker>
  </defs>

  <!-- Top: Agent Request → Registry Lookup (centered) -->
  <rect x="305" y="20" width="210" height="36" rx="6" fill="white" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="410" y="43" text-anchor="middle" font-size="11" font-weight="600" fill="#78350F">Agent Request</text>

  <line x1="410" y1="56" x2="410" y2="80" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="305" y="80" width="210" height="36" rx="6" fill="white" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="410" y="103" text-anchor="middle" font-size="11" font-weight="600" fill="#78350F">Registry Lookup</text>

  <line x1="410" y1="116" x2="410" y2="140" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Policy Check diamond -->
  <polygon points="410,143 480,165 410,187 340,165" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
  <text x="410" y="162" text-anchor="middle" font-size="10.5" font-weight="700" fill="#78350F">Policy Check</text>
  <text x="410" y="175" text-anchor="middle" font-size="8.5" fill="#92400E" font-style="italic">Cedar engine</text>

  <!-- Three branches from diamond -->

  <!-- DENY branch (left) -->
  <line x1="340" y1="165" x2="100" y2="165" stroke="#EF4444" stroke-width="1.5"/>
  <line x1="100" y1="165" x2="100" y2="235" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="215" y="158" text-anchor="middle" font-size="9" fill="#EF4444" font-weight="600">DENY</text>

  <rect x="20" y="235" width="165" height="46" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="102" y="254" text-anchor="middle" font-size="10" font-weight="600" fill="#991B1B">Error to agent</text>
  <text x="102" y="270" text-anchor="middle" font-size="9" fill="#B91C1C">logged + audited</text>

  <!-- ALLOW branch (center, straight down) -->
  <line x1="410" y1="187" x2="410" y2="235" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="420" y="215" font-size="9" fill="#22C55E" font-weight="600">ALLOW</text>

  <rect x="290" y="235" width="240" height="36" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="410" y="258" text-anchor="middle" font-size="10.5" font-weight="600" fill="#14532D">Execute via Civitas</text>

  <!-- Sub-branches from Execute -->
  <line x1="410" y1="271" x2="410" y2="296" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="250" y1="296" x2="570" y2="296" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="250" y1="296" x2="250" y2="318" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="410" y1="296" x2="410" y2="318" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="570" y1="296" x2="570" y2="318" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="170" y="318" width="162" height="36" rx="5" fill="white" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="251" y="334" text-anchor="middle" font-size="9.5" font-weight="600" fill="#374151">LLM call</text>
  <text x="251" y="347" text-anchor="middle" font-size="8.5" fill="#6B7280">LLM Gateway → Provider</text>

  <rect x="340" y="318" width="140" height="36" rx="5" fill="white" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="410" y="334" text-anchor="middle" font-size="9.5" font-weight="600" fill="#374151">Tool call</text>
  <text x="410" y="347" text-anchor="middle" font-size="8.5" fill="#6B7280">MCP Gateway</text>

  <rect x="488" y="318" width="165" height="36" rx="5" fill="white" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="570" y="334" text-anchor="middle" font-size="9.5" font-weight="600" fill="#374151">Message send</text>
  <text x="570" y="347" text-anchor="middle" font-size="8.5" fill="#6B7280">MessageBus → Agent</text>

  <!-- REQUIRE_APPROVAL branch (right) -->
  <line x1="480" y1="165" x2="720" y2="165" stroke="#F59E0B" stroke-width="1.5"/>
  <line x1="720" y1="165" x2="720" y2="235" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arr-amber)"/>
  <text x="605" y="158" text-anchor="middle" font-size="9" fill="#F59E0B" font-weight="600">REQUIRE_APPROVAL</text>

  <rect x="635" y="235" width="170" height="36" rx="6" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="720" y="254" text-anchor="middle" font-size="10" font-weight="600" fill="#78350F">Queue for human review</text>
  <text x="720" y="269" text-anchor="middle" font-size="8.5" fill="#92400E">HITL approval request</text>

  <line x1="720" y1="271" x2="720" y2="318" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arr-amber)"/>
  <rect x="635" y="318" width="170" height="36" rx="6" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="720" y="337" text-anchor="middle" font-size="10" font-weight="600" fill="#78350F">Approver authenticates</text>
  <text x="720" y="351" text-anchor="middle" font-size="8.5" fill="#92400E">via org IdP (Entra / Okta)</text>

  <line x1="720" y1="354" x2="720" y2="398" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arr-amber)"/>
  <rect x="635" y="398" width="170" height="36" rx="6" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="720" y="416" text-anchor="middle" font-size="10" font-weight="600" fill="#78350F">Resume signal</text>
  <text x="720" y="430" text-anchor="middle" font-size="8.5" fill="#92400E">Civitas durable suspension</text>

  <!-- All paths converge to AuditSink -->
  <!-- Lines from each terminal node going down to AuditSink -->
  <line x1="102" y1="281" x2="102" y2="470" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="251" y1="354" x2="251" y2="470" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="410" y1="354" x2="410" y2="470" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="570" y1="354" x2="570" y2="470" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="720" y1="434" x2="720" y2="470" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Horizontal gather line -->
  <line x1="102" y1="470" x2="720" y2="470" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="410" y1="470" x2="410" y2="486" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- AuditSink -->
  <rect x="275" y="486" width="270" height="36" rx="6" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="410" y="505" text-anchor="middle" font-size="10.5" font-weight="600" fill="#5B21B6">AuditSink → presidium-audit → Export</text>

</svg>
