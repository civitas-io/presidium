<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" width="680" height="300"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9CA3AF"/>
    </marker>
  </defs>

  <!-- ── Left section: Stack diagram ── -->
  <text x="155" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#6B7280" letter-spacing="0.8">THE STACK</text>

  <!-- Fiddler layer -->
  <rect x="30" y="35" width="250" height="62" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="155" y="56" text-anchor="middle" font-size="10" font-weight="700" fill="#1D4ED8">OBSERVE &amp; PROTECT — Fiddler</text>
  <text x="155" y="72" text-anchor="middle" font-size="9.5" fill="#2563EB">Trust Models · Guardrails · Dashboards</text>
  <text x="155" y="87" text-anchor="middle" font-size="8.5" fill="#3B82F6" font-style="italic">sits above — observes telemetry from below</text>

  <!-- Presidium layer -->
  <rect x="30" y="115" width="250" height="62" rx="8" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="155" y="136" text-anchor="middle" font-size="10" font-weight="700" fill="#78350F">GOVERN &amp; ROUTE — Presidium</text>
  <text x="155" y="152" text-anchor="middle" font-size="9.5" fill="#92400E">Policy Engine · Registry · Gateways</text>
  <text x="155" y="167" text-anchor="middle" font-size="8.5" fill="#B45309" font-style="italic">generates governance telemetry</text>

  <!-- Civitas layer -->
  <rect x="30" y="195" width="250" height="62" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="155" y="216" text-anchor="middle" font-size="10" font-weight="700" fill="#14532D">RUN &amp; SURVIVE — Civitas</text>
  <text x="155" y="232" text-anchor="middle" font-size="9.5" fill="#166534">Supervision · Messaging · Transport</text>
  <text x="155" y="247" text-anchor="middle" font-size="8.5" fill="#15803D" font-style="italic">the runtime Presidium governs</text>

  <!-- Stack connectors (double-ended arrows showing telemetry flow up) -->
  <line x1="155" y1="97" x2="155" y2="115" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="155" y1="177" x2="155" y2="195" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Divider -->
  <line x1="310" y1="30" x2="310" y2="270" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ── Right section: Data flow ── -->
  <text x="490" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#6B7280" letter-spacing="0.8">DATA FLOW</text>

  <!-- Presidium box (left of flow) -->
  <rect x="340" y="110" width="155" height="68" rx="8" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="417" y="132" text-anchor="middle" font-size="11" font-weight="700" fill="#78350F">Presidium</text>
  <text x="417" y="148" text-anchor="middle" font-size="9" fill="#92400E">runtime + governance</text>
  <text x="417" y="163" text-anchor="middle" font-size="8.5" fill="#B45309" font-style="italic">generates telemetry</text>

  <!-- Arrow with label -->
  <line x1="495" y1="144" x2="545" y2="144" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arr)"/>
  <text x="520" y="136" text-anchor="middle" font-size="8" fill="#6B7280">OTEL spans</text>
  <text x="520" y="147" text-anchor="middle" font-size="8" fill="#6B7280">+ governance</text>
  <text x="520" y="158" text-anchor="middle" font-size="8" fill="#6B7280">metrics</text>

  <!-- Fiddler box (right of flow) -->
  <rect x="545" y="110" width="110" height="68" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="600" y="132" text-anchor="middle" font-size="11" font-weight="700" fill="#1D4ED8">Fiddler</text>
  <text x="600" y="148" text-anchor="middle" font-size="9" fill="#2563EB">analyzes</text>
  <text x="600" y="161" text-anchor="middle" font-size="9" fill="#2563EB">dashboards · alerts</text>

  <!-- Presidium is a data source note -->
  <text x="490" y="220" text-anchor="middle" font-size="9" fill="#6B7280" font-style="italic">Presidium is a data source for Fiddler.</text>
  <text x="490" y="234" text-anchor="middle" font-size="9" fill="#6B7280" font-style="italic">FiddlerExporter ships governance metrics upstream.</text>

</svg>
