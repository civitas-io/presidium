<svg viewBox="0 0 780 520" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9CA3AF"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="390" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#E5E7EB">Interface-First Architecture</text>
  <text x="390" y="48" text-anchor="middle" font-size="11" fill="#9CA3AF">Protocols in core, implementations in contrib — same pattern at both layers</text>

  <!-- ═══ PRESIDIUM SIDE (left) ═══ -->

  <!-- presidium core box -->
  <rect x="30" y="75" width="340" height="195" rx="10" fill="none" stroke="#7C3AED" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="200" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#A78BFA">presidium</text>
  <text x="200" y="112" text-anchor="middle" font-size="9" fill="#9CA3AF">pip install presidium</text>

  <!-- Protocol boxes inside presidium -->
  <rect x="50" y="125" width="145" height="32" rx="5" fill="#4C1D95"/>
  <text x="122" y="145" text-anchor="middle" font-size="10" font-weight="600" fill="white">PolicyEngine</text>

  <rect x="205" y="125" width="145" height="32" rx="5" fill="#4C1D95"/>
  <text x="277" y="145" text-anchor="middle" font-size="10" font-weight="600" fill="white">AgentRegistry</text>

  <rect x="50" y="167" width="145" height="32" rx="5" fill="#4C1D95"/>
  <text x="122" y="187" text-anchor="middle" font-size="10" font-weight="600" fill="white">CredentialProvider</text>

  <rect x="205" y="167" width="145" height="32" rx="5" fill="#4C1D95"/>
  <text x="277" y="187" text-anchor="middle" font-size="10" font-weight="600" fill="white">TrustScorer</text>

  <rect x="50" y="209" width="145" height="32" rx="5" fill="#4C1D95"/>
  <text x="122" y="229" text-anchor="middle" font-size="10" font-weight="600" fill="white">ApprovalService</text>

  <rect x="205" y="209" width="145" height="32" rx="5" fill="#4C1D95"/>
  <text x="277" y="229" text-anchor="middle" font-size="10" font-weight="600" fill="white">GovernedModelProvider</text>

  <!-- Label: Protocols -->
  <text x="200" y="260" text-anchor="middle" font-size="9" fill="#A78BFA" font-style="italic">Python Protocols + CEL defaults</text>

  <!-- presidium-contrib box -->
  <rect x="30" y="285" width="340" height="150" rx="10" fill="none" stroke="#7C3AED" stroke-width="2"/>
  <text x="200" y="305" text-anchor="middle" font-size="13" font-weight="700" fill="#A78BFA">presidium-contrib</text>
  <text x="200" y="322" text-anchor="middle" font-size="9" fill="#9CA3AF">pip install presidium-contrib[opa,vault,...]</text>

  <!-- Adapter boxes -->
  <rect x="50" y="335" width="70" height="28" rx="4" fill="#5B21B6"/>
  <text x="85" y="353" text-anchor="middle" font-size="9" font-weight="600" fill="white">OPA</text>

  <rect x="128" y="335" width="70" height="28" rx="4" fill="#5B21B6"/>
  <text x="163" y="353" text-anchor="middle" font-size="9" font-weight="600" fill="white">Vault</text>

  <rect x="206" y="335" width="70" height="28" rx="4" fill="#5B21B6"/>
  <text x="241" y="353" text-anchor="middle" font-size="9" font-weight="600" fill="white">LiteLLM</text>

  <rect x="284" y="335" width="70" height="28" rx="4" fill="#5B21B6"/>
  <text x="319" y="353" text-anchor="middle" font-size="9" font-weight="600" fill="white">Slack</text>

  <text x="200" y="380" text-anchor="middle" font-size="8" fill="#9CA3AF">Adapters (existing products)</text>

  <!-- Reference impl boxes -->
  <rect x="50" y="392" width="100" height="28" rx="4" fill="#6D28D9"/>
  <text x="100" y="410" text-anchor="middle" font-size="9" font-weight="600" fill="white">Postgres Reg.</text>

  <rect x="158" y="392" width="100" height="28" rx="4" fill="#6D28D9"/>
  <text x="208" y="410" text-anchor="middle" font-size="9" font-weight="600" fill="white">MCP Gov.</text>

  <rect x="266" y="392" width="100" height="28" rx="4" fill="#6D28D9"/>
  <text x="316" y="410" text-anchor="middle" font-size="9" font-weight="600" fill="white">Trust Scorer</text>

  <text x="200" y="435" text-anchor="middle" font-size="8" fill="#9CA3AF">Reference impls (novel)</text>

  <!-- Arrow: contrib → core -->
  <line x1="200" y1="285" x2="200" y2="272" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="220" y="280" font-size="8" fill="#6B7280">implements</text>

  <!-- ═══ CIVITAS SIDE (right) — mirror ═══ -->

  <!-- civitas core box -->
  <rect x="420" y="75" width="340" height="195" rx="10" fill="none" stroke="#2563EB" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="590" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#60A5FA">civitas</text>
  <text x="590" y="112" text-anchor="middle" font-size="9" fill="#9CA3AF">pip install civitas</text>

  <!-- Protocol boxes inside civitas -->
  <rect x="440" y="125" width="145" height="32" rx="5" fill="#1E3A5F"/>
  <text x="512" y="145" text-anchor="middle" font-size="10" font-weight="600" fill="white">ModelProvider</text>

  <rect x="595" y="125" width="145" height="32" rx="5" fill="#1E3A5F"/>
  <text x="667" y="145" text-anchor="middle" font-size="10" font-weight="600" fill="white">ToolProvider</text>

  <rect x="440" y="167" width="145" height="32" rx="5" fill="#1E3A5F"/>
  <text x="512" y="187" text-anchor="middle" font-size="10" font-weight="600" fill="white">StateStore</text>

  <rect x="595" y="167" width="145" height="32" rx="5" fill="#1E3A5F"/>
  <text x="667" y="187" text-anchor="middle" font-size="10" font-weight="600" fill="white">Transport</text>

  <rect x="440" y="209" width="145" height="32" rx="5" fill="#1E3A5F"/>
  <text x="512" y="229" text-anchor="middle" font-size="10" font-weight="600" fill="white">EvalExporter</text>

  <rect x="595" y="209" width="145" height="32" rx="5" fill="#1E3A5F"/>
  <text x="667" y="229" text-anchor="middle" font-size="10" font-weight="600" fill="white">AuditSink</text>

  <!-- Label: Protocols -->
  <text x="590" y="260" text-anchor="middle" font-size="9" fill="#60A5FA" font-style="italic">Python Protocols + InProcess defaults</text>

  <!-- civitas-contrib box -->
  <rect x="420" y="285" width="340" height="150" rx="10" fill="none" stroke="#2563EB" stroke-width="2"/>
  <text x="590" y="305" text-anchor="middle" font-size="13" font-weight="700" fill="#60A5FA">civitas-contrib</text>
  <text x="590" y="322" text-anchor="middle" font-size="9" fill="#9CA3AF">pip install civitas-contrib[anthropic,openai,...]</text>

  <!-- Provider boxes -->
  <rect x="440" y="335" width="70" height="28" rx="4" fill="#1E40AF"/>
  <text x="475" y="353" text-anchor="middle" font-size="9" font-weight="600" fill="white">Anthropic</text>

  <rect x="518" y="335" width="70" height="28" rx="4" fill="#1E40AF"/>
  <text x="553" y="353" text-anchor="middle" font-size="9" font-weight="600" fill="white">OpenAI</text>

  <rect x="596" y="335" width="70" height="28" rx="4" fill="#1E40AF"/>
  <text x="631" y="353" text-anchor="middle" font-size="9" font-weight="600" fill="white">Gemini</text>

  <rect x="674" y="335" width="70" height="28" rx="4" fill="#1E40AF"/>
  <text x="709" y="353" text-anchor="middle" font-size="9" font-weight="600" fill="white">LiteLLM</text>

  <text x="590" y="380" text-anchor="middle" font-size="8" fill="#9CA3AF">Model providers</text>

  <!-- More provider boxes -->
  <rect x="440" y="392" width="80" height="28" rx="4" fill="#1E40AF"/>
  <text x="480" y="410" text-anchor="middle" font-size="9" font-weight="600" fill="white">SQLite Store</text>

  <rect x="528" y="392" width="80" height="28" rx="4" fill="#1E40AF"/>
  <text x="568" y="410" text-anchor="middle" font-size="9" font-weight="600" fill="white">Postgres Store</text>

  <rect x="616" y="392" width="80" height="28" rx="4" fill="#1E40AF"/>
  <text x="656" y="410" text-anchor="middle" font-size="9" font-weight="600" fill="white">Arize Export</text>

  <text x="590" y="435" text-anchor="middle" font-size="8" fill="#9CA3AF">State stores, eval exporters, adapters</text>

  <!-- Arrow: contrib → core -->
  <line x1="590" y1="285" x2="590" y2="272" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="610" y="280" font-size="8" fill="#6B7280">implements</text>

  <!-- ═══ CROSS-DEPENDENCY ═══ -->
  <!-- presidium → civitas -->
  <line x1="370" y1="170" x2="418" y2="170" stroke="#9CA3AF" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="394" y="164" text-anchor="middle" font-size="8" fill="#6B7280">depends on</text>

  <!-- ═══ MIRROR LABEL ═══ -->
  <rect x="295" y="465" width="190" height="40" rx="8" fill="#1F2937"/>
  <text x="390" y="483" text-anchor="middle" font-size="10" font-weight="600" fill="#D1D5DB">Same pattern, both layers</text>
  <text x="390" y="498" text-anchor="middle" font-size="9" fill="#9CA3AF">Protocols in core, implementations in contrib</text>
</svg>