<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 565" width="900" height="565"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">

  <defs>
    <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9CA3AF"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8B5CF6"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3B82F6"/>
    </marker>
    <filter id="layer-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000012"/>
    </filter>
  </defs>

  <!-- ─── TOP ROW: Identity Providers + External Consumers ─── -->

  <rect x="20" y="20" width="242" height="92" rx="8"
        fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5" filter="url(#layer-shadow)"/>
  <text x="141" y="44" text-anchor="middle" font-size="10.5" font-weight="700" fill="#5B21B6" letter-spacing="0.3">Enterprise Identity Providers</text>
  <text x="141" y="61" text-anchor="middle" font-size="10" fill="#6D28D9">Entra ID · Okta</text>
  <text x="141" y="76" text-anchor="middle" font-size="10" fill="#6D28D9">Google IAM · AWS IAM</text>
  <text x="141" y="101" text-anchor="middle" font-size="8.5" fill="#7C3AED" font-style="italic">OAuth 2.1 · OBO · XAA / ID-JAG</text>

  <rect x="638" y="20" width="242" height="92" rx="8"
        fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5" filter="url(#layer-shadow)"/>
  <text x="759" y="44" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1D4ED8" letter-spacing="0.3">External Consumers</text>
  <text x="759" y="61" text-anchor="middle" font-size="10" fill="#2563EB">Fiddler · Arize · Langfuse</text>
  <text x="759" y="76" text-anchor="middle" font-size="10" fill="#2563EB">Datadog · Prometheus</text>
  <text x="759" y="101" text-anchor="middle" font-size="8.5" fill="#3B82F6" font-style="italic">governance metrics · OTEL spans</text>

  <!-- ─── PRESIDIUM LAYER ─── -->

  <rect x="20" y="130" width="860" height="225" rx="10"
        fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5" filter="url(#layer-shadow)"/>
  <text x="38" y="151" font-size="9" font-weight="700" fill="#92400E" letter-spacing="1.5">PRESIDIUM — Governance Layer</text>

  <!-- presidium-audit -->
  <rect x="40" y="163" width="192" height="72" rx="6" fill="white" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="136" y="182" text-anchor="middle" font-size="10.5" font-weight="700" fill="#78350F">presidium-audit</text>
  <text x="136" y="197" text-anchor="middle" font-size="9" fill="#92400E">Governance metrics</text>
  <text x="136" y="211" text-anchor="middle" font-size="9" fill="#92400E">Compliance · Export</text>
  <text x="136" y="228" text-anchor="middle" font-size="8" fill="#B45309" font-style="italic">AuditSink · EvalLoop hooks</text>

  <!-- presidium-policy -->
  <rect x="247" y="163" width="192" height="72" rx="6" fill="white" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="343" y="182" text-anchor="middle" font-size="10.5" font-weight="700" fill="#78350F">presidium-policy</text>
  <text x="343" y="197" text-anchor="middle" font-size="9" fill="#92400E">Cedar · OPA · YAML</text>
  <text x="343" y="211" text-anchor="middle" font-size="9" fill="#92400E">ALLOW · DENY · REQUIRE_APPROVAL</text>
  <text x="343" y="228" text-anchor="middle" font-size="8" fill="#B45309" font-style="italic">Supervisor · MessageBus hooks</text>

  <!-- presidium-llm-gateway -->
  <rect x="454" y="163" width="192" height="72" rx="6" fill="white" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="550" y="182" text-anchor="middle" font-size="10.5" font-weight="700" fill="#78350F">presidium-llm-gateway</text>
  <text x="550" y="197" text-anchor="middle" font-size="9" fill="#92400E">Rate limits · Cost tracking</text>
  <text x="550" y="211" text-anchor="middle" font-size="9" fill="#92400E">Budget enforcement</text>
  <text x="550" y="228" text-anchor="middle" font-size="8" fill="#B45309" font-style="italic">ModelProvider protocol</text>

  <!-- presidium-mcp-gateway -->
  <rect x="661" y="163" width="198" height="72" rx="6" fill="white" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="760" y="182" text-anchor="middle" font-size="10.5" font-weight="700" fill="#78350F">presidium-mcp-gateway</text>
  <text x="760" y="197" text-anchor="middle" font-size="9" fill="#92400E">Tool ACLs · OAuth 2.1</text>
  <text x="760" y="211" text-anchor="middle" font-size="9" fill="#92400E">Poisoning detection · HITL</text>
  <text x="760" y="228" text-anchor="middle" font-size="8" fill="#B45309" font-style="italic">ToolProvider protocol</text>

  <!-- presidium-registry — slightly more prominent as the foundation -->
  <rect x="260" y="255" width="380" height="72" rx="6"
        fill="white" stroke="#F59E0B" stroke-width="2"/>
  <text x="450" y="274" text-anchor="middle" font-size="10.5" font-weight="700" fill="#78350F">presidium-registry</text>
  <text x="450" y="289" text-anchor="middle" font-size="9" fill="#92400E">Agent identity · Grants · Trust scores</text>
  <text x="450" y="303" text-anchor="middle" font-size="9" fill="#92400E">Credential vault · Token exchange</text>
  <text x="450" y="318" text-anchor="middle" font-size="8" fill="#B45309" font-style="italic">RegistryListener · Credential context injection</text>

  <!-- ─── CIVITAS LAYER ─── -->

  <rect x="20" y="378" width="860" height="96" rx="10"
        fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5" filter="url(#layer-shadow)"/>
  <text x="38" y="399" font-size="9" font-weight="700" fill="#14532D" letter-spacing="1.5">CIVITAS — Runtime Layer</text>
  <text x="450" y="419" text-anchor="middle" font-size="10" fill="#166534">Runtime · Supervisor · MessageBus · AgentProcess · StateStore · OTEL</text>
  <text x="450" y="436" text-anchor="middle" font-size="10" fill="#166534">ModelProvider · ToolProvider · MCPClient · AuditSink · EvalLoop</text>
  <text x="450" y="453" text-anchor="middle" font-size="8.5" fill="#15803D" font-style="italic">RegistryListener · ExportBackend · Durable Suspension · Credential Context</text>

  <!-- ─── AGENT FRAMEWORKS ─── -->

  <text x="450" y="508" text-anchor="middle" font-size="9.5" font-weight="600" fill="#9CA3AF" letter-spacing="1">Agent Frameworks</text>

  <rect x="100" y="517" width="122" height="34" rx="17" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="161" y="539" text-anchor="middle" font-size="10.5" fill="#4B5563">LangGraph</text>

  <rect x="242" y="517" width="100" height="34" rx="17" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="292" y="539" text-anchor="middle" font-size="10.5" fill="#4B5563">CrewAI</text>

  <rect x="362" y="517" width="176" height="34" rx="17" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="450" y="539" text-anchor="middle" font-size="10.5" fill="#4B5563">OpenAI Agents SDK</text>

  <rect x="558" y="517" width="145" height="34" rx="17" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="630" y="539" text-anchor="middle" font-size="10.5" fill="#4B5563">Custom Agents</text>

  <!-- ─── ARROWS ─── -->

  <!-- IdPs → Registry: right side of IdPs → curves down into top of registry -->
  <path d="M 262 66 C 310 66 310 190 310 255"
        fill="none" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="5,3"
        marker-end="url(#arr-purple)"/>
  <text x="274" y="170" font-size="8" fill="#7C3AED" font-style="italic">token exchange</text>

  <!-- Audit → External Consumers: curves up-right from audit to external -->
  <path d="M 210 163 C 210 105 638 92 638 112"
        fill="none" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="5,3"
        marker-end="url(#arr-blue)"/>
  <text x="388" y="101" font-size="8" fill="#2563EB" font-style="italic">governance telemetry</text>

  <!-- Presidium → Civitas -->
  <line x1="450" y1="356" x2="450" y2="375"
        stroke="#9CA3AF" stroke-width="2" marker-end="url(#arr-gray)"/>

  <!-- Civitas → Frameworks -->
  <line x1="450" y1="475" x2="450" y2="503"
        stroke="#9CA3AF" stroke-width="2" marker-end="url(#arr-gray)"/>

</svg>
