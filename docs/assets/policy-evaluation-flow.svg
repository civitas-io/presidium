<svg viewBox="0 0 780 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9CA3AF"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10B981"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#F59E0B"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="390" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#E5E7EB">Policy Evaluation: CEL vs OPA</text>
  <text x="390" y="48" text-anchor="middle" font-size="11" fill="#9CA3AF">Same PolicyEngine protocol, different evaluation strategies</text>

  <!-- ═══ CEL PATH (top) ═══ -->
  <text x="390" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#10B981">CEL (Library Mode) — default</text>

  <!-- Agent action -->
  <rect x="30" y="90" width="130" height="48" rx="6" fill="#2D6A4F"/>
  <text x="95" y="110" text-anchor="middle" font-size="10" font-weight="600" fill="white">AgentProcess</text>
  <text x="95" y="126" text-anchor="middle" font-size="8" fill="#D1FAE5">tool_call("db.write")</text>

  <!-- Arrow -->
  <line x1="160" y1="114" x2="195" y2="114" stroke="#10B981" stroke-width="1.8" marker-end="url(#arr-green)"/>
  <text x="177" y="107" text-anchor="middle" font-size="7" fill="#6B7280">in-process</text>

  <!-- CEL engine -->
  <rect x="197" y="90" width="200" height="48" rx="6" fill="#4C1D95"/>
  <text x="297" y="108" text-anchor="middle" font-size="10" font-weight="600" fill="white">CelPolicyEngine</text>
  <text x="297" y="124" text-anchor="middle" font-size="8" fill="#DDD6FE">agent.grants.exists(g, g == "db:write")</text>

  <!-- Arrow -->
  <line x1="397" y1="114" x2="432" y2="114" stroke="#10B981" stroke-width="1.8" marker-end="url(#arr-green)"/>

  <!-- Decision -->
  <rect x="434" y="92" width="80" height="44" rx="6" fill="#065F46"/>
  <text x="474" y="114" text-anchor="middle" font-size="10" font-weight="700" fill="white">ALLOW</text>
  <text x="474" y="129" text-anchor="middle" font-size="7" fill="#6EE7B7">~1 us</text>

  <!-- Arrow to action -->
  <line x1="514" y1="114" x2="549" y2="114" stroke="#10B981" stroke-width="1.8" marker-end="url(#arr-green)"/>

  <!-- Execute -->
  <rect x="551" y="90" width="130" height="48" rx="6" fill="#1E3A5F"/>
  <text x="616" y="110" text-anchor="middle" font-size="10" font-weight="600" fill="white">Execute action</text>
  <text x="616" y="126" text-anchor="middle" font-size="8" fill="#93C5FD">db.write(...)</text>

  <!-- Timing callout -->
  <rect x="695" y="96" width="70" height="36" rx="5" fill="#1F2937" stroke="#10B981" stroke-width="1"/>
  <text x="730" y="112" text-anchor="middle" font-size="9" font-weight="700" fill="#10B981">~1 us</text>
  <text x="730" y="126" text-anchor="middle" font-size="7" fill="#6B7280">no network</text>

  <!-- Divider -->
  <line x1="30" y1="158" x2="750" y2="158" stroke="#374151" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ═══ OPA PATH (bottom) ═══ -->
  <text x="390" y="182" text-anchor="middle" font-size="12" font-weight="700" fill="#F59E0B">OPA (Service Mode) — adapter</text>

  <!-- Agent action -->
  <rect x="30" y="195" width="130" height="48" rx="6" fill="#2D6A4F"/>
  <text x="95" y="215" text-anchor="middle" font-size="10" font-weight="600" fill="white">AgentProcess</text>
  <text x="95" y="231" text-anchor="middle" font-size="8" fill="#D1FAE5">tool_call("db.write")</text>

  <!-- Arrow -->
  <line x1="160" y1="219" x2="195" y2="219" stroke="#F59E0B" stroke-width="1.8" marker-end="url(#arr-amber)"/>
  <text x="177" y="212" text-anchor="middle" font-size="7" fill="#6B7280">in-process</text>

  <!-- OPA client -->
  <rect x="197" y="195" width="130" height="48" rx="6" fill="#5B21B6"/>
  <text x="262" y="215" text-anchor="middle" font-size="10" font-weight="600" fill="white">OPA Adapter</text>
  <text x="262" y="231" text-anchor="middle" font-size="8" fill="#DDD6FE">translate to Rego</text>

  <!-- Arrow (network) -->
  <line x1="327" y1="219" x2="372" y2="219" stroke="#F59E0B" stroke-width="1.8" marker-end="url(#arr-amber)" stroke-dasharray="5,3"/>
  <text x="349" y="212" text-anchor="middle" font-size="7" fill="#6B7280">HTTP</text>

  <!-- OPA server -->
  <rect x="374" y="195" width="130" height="48" rx="6" fill="#92400E" stroke="#F59E0B" stroke-width="1"/>
  <text x="439" y="215" text-anchor="middle" font-size="10" font-weight="600" fill="white">OPA Server</text>
  <text x="439" y="231" text-anchor="middle" font-size="8" fill="#FDE68A">Rego evaluation</text>

  <!-- Arrow back -->
  <line x1="504" y1="219" x2="549" y2="219" stroke="#F59E0B" stroke-width="1.8" marker-end="url(#arr-amber)" stroke-dasharray="5,3"/>

  <!-- Execute -->
  <rect x="551" y="195" width="130" height="48" rx="6" fill="#1E3A5F"/>
  <text x="616" y="215" text-anchor="middle" font-size="10" font-weight="600" fill="white">Execute action</text>
  <text x="616" y="231" text-anchor="middle" font-size="8" fill="#93C5FD">db.write(...)</text>

  <!-- Timing callout -->
  <rect x="695" y="201" width="70" height="36" rx="5" fill="#1F2937" stroke="#F59E0B" stroke-width="1"/>
  <text x="730" y="217" text-anchor="middle" font-size="9" font-weight="700" fill="#F59E0B">~1-5 ms</text>
  <text x="730" y="231" text-anchor="middle" font-size="7" fill="#6B7280">HTTP round-trip</text>

  <!-- Bottom note -->
  <text x="390" y="275" text-anchor="middle" font-size="10" font-weight="600" fill="#D1D5DB">Same PolicyEngine protocol. Same agent code. Different latency characteristics.</text>
  <text x="390" y="293" text-anchor="middle" font-size="9" fill="#9CA3AF">Use CEL for single-process. Switch to OPA when you need centralized policy management.</text>
</svg>