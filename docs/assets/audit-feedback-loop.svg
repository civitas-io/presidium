<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 510" width="500" height="510"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9CA3AF"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22C55E"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3B82F6"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#EF4444"/>
    </marker>
  </defs>

  <!-- Step boxes, centered at x=250 -->
  <rect x="110" y="20" width="280" height="36" rx="6" fill="white" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="250" y="43" text-anchor="middle" font-size="11" font-weight="600" fill="#78350F">Agent acts</text>

  <rect x="110" y="90" width="280" height="36" rx="6" fill="white" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="250" y="113" text-anchor="middle" font-size="11" font-weight="600" fill="#78350F">Policy evaluates</text>

  <rect x="110" y="160" width="280" height="36" rx="6" fill="white" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="250" y="183" text-anchor="middle" font-size="11" font-weight="600" fill="#78350F">AuditSink emits event</text>

  <rect x="110" y="230" width="280" height="36" rx="6" fill="white" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="250" y="249" text-anchor="middle" font-size="11" font-weight="600" fill="#78350F">GovernanceAuditSink enriches</text>
  <text x="250" y="261" text-anchor="middle" font-size="8.5" fill="#92400E">adds policy decision, trust score, grants</text>

  <rect x="80" y="310" width="340" height="36" rx="6" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
  <text x="250" y="328" text-anchor="middle" font-size="11" font-weight="700" fill="#78350F">Aggregator computes window metrics</text>
  <text x="250" y="340" text-anchor="middle" font-size="8.5" fill="#92400E">compliance rate · denial count · budget utilization</text>

  <!-- Vertical arrows (main flow) -->
  <line x1="250" y1="56" x2="250" y2="90" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="250" y1="126" x2="250" y2="160" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="250" y1="196" x2="250" y2="230" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="250" y1="266" x2="250" y2="310" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3-way split from Aggregator -->
  <!-- Line from aggregator bottom to branch point -->
  <line x1="250" y1="346" x2="250" y2="376" stroke="#9CA3AF" stroke-width="1.5"/>
  <!-- Horizontal spread -->
  <line x1="90" y1="376" x2="420" y2="376" stroke="#9CA3AF" stroke-width="1"/>
  <!-- Drops to 3 boxes -->
  <line x1="90" y1="376" x2="90" y2="400" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="250" y1="376" x2="250" y2="400" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="420" y1="376" x2="420" y2="400" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- Trust score box -->
  <rect x="20" y="400" width="140" height="36" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="90" y="419" text-anchor="middle" font-size="10" font-weight="600" fill="#14532D">Trust score</text>
  <text x="90" y="431" text-anchor="middle" font-size="9" fill="#166534">adjustment</text>

  <!-- Export box -->
  <rect x="178" y="400" width="145" height="36" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="250" y="419" text-anchor="middle" font-size="10" font-weight="600" fill="#1D4ED8">Export to Fiddler</text>
  <text x="250" y="431" text-anchor="middle" font-size="9" fill="#2563EB">Arize · Langfuse</text>

  <!-- Alert box -->
  <rect x="352" y="400" width="138" height="36" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="421" y="419" text-anchor="middle" font-size="10" font-weight="600" fill="#991B1B">Alert if threshold</text>
  <text x="421" y="431" text-anchor="middle" font-size="9" fill="#B91C1C">breached</text>

  <!-- Trust → update_trust -->
  <line x1="90" y1="436" x2="90" y2="465" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <rect x="18" y="465" width="145" height="36" rx="6" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
  <text x="90" y="479" text-anchor="middle" font-size="9.5" font-weight="600" fill="#14532D">AgentRegistry</text>
  <text x="90" y="492" text-anchor="middle" font-size="9.5" font-weight="600" fill="#14532D">.update_trust()</text>

</svg>
