<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 450" width="520" height="450"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9CA3AF"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#F59E0B"/>
    </marker>
  </defs>

  <!-- Main flow column, centered at x=165 -->

  <!-- Start marker -->
  <circle cx="165" cy="28" r="10" fill="#78350F"/>

  <!-- States (main vertical flow) -->
  <rect x="90" y="55" width="150" height="36" rx="18" fill="white" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="165" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="#78350F">REGISTERED</text>

  <rect x="90" y="130" width="150" height="36" rx="18" fill="white" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="165" y="153" text-anchor="middle" font-size="11" font-weight="600" fill="#78350F">STARTING</text>

  <rect x="90" y="210" width="150" height="36" rx="18" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
  <text x="165" y="233" text-anchor="middle" font-size="11" font-weight="700" fill="#78350F">RUNNING</text>

  <rect x="90" y="290" width="150" height="36" rx="18" fill="white" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="165" y="313" text-anchor="middle" font-size="11" font-weight="600" fill="#78350F">STOPPING</text>

  <rect x="90" y="370" width="150" height="36" rx="18" fill="white" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="165" y="393" text-anchor="middle" font-size="11" font-weight="600" fill="#78350F">STOPPED</text>

  <!-- End marker -->
  <circle cx="165" cy="428" r="10" fill="white" stroke="#78350F" stroke-width="2"/>
  <circle cx="165" cy="428" r="6" fill="#78350F"/>

  <!-- Main flow arrows -->
  <line x1="165" y1="38" x2="165" y2="55" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="165" y1="91" x2="165" y2="130" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="165" y1="166" x2="165" y2="210" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="165" y1="246" x2="165" y2="290" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="165" y1="326" x2="165" y2="370" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="165" y1="406" x2="165" y2="418" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- SUSPENDED state (right column) -->
  <rect x="330" y="188" width="155" height="36" rx="18"
        fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="407" y="211" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">SUSPENDED</text>

  <!-- STARTING → SUSPENDED (policy violation) -->
  <path d="M 240 148 L 330 206" fill="none" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="5,3"
        marker-end="url(#arr-amber)"/>
  <text x="290" y="167" font-size="8.5" fill="#92400E" text-anchor="middle">policy violation</text>

  <!-- RUNNING → SUSPENDED (trust below threshold) -->
  <line x1="240" y1="228" x2="330" y2="213" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="5,3"
        marker-end="url(#arr-amber)"/>
  <text x="292" y="228" font-size="8.5" fill="#92400E" text-anchor="middle">trust below</text>
  <text x="292" y="238" font-size="8.5" fill="#92400E" text-anchor="middle">threshold</text>

  <!-- SUSPENDED → STARTING (human review approved, curved back left) -->
  <path d="M 330 196 C 280 180 240 162 240 148" fill="none" stroke="#22C55E" stroke-width="1.5"
        marker-end="url(#arr-amber)"/>
  <text x="295" y="175" font-size="8" fill="#15803D" text-anchor="middle" font-style="italic">human review</text>
  <text x="295" y="185" font-size="8" fill="#15803D" text-anchor="middle" font-style="italic">approved</text>

</svg>
