  <text x="124" y="210" text-anchor="middle" fill="#9CA3AF" font-size="9.5">PolicyEngine</text>
  <text x="124" y="224" text-anchor="middle" fill="#9CA3AF" font-size="9.5">AgentRegistry</text>
  <text x="124" y="238" text-anchor="middle" fill="#9CA3AF" font-size="9.5">CredentialProvider</text>
  <text x="124" y="252" text-anchor="middle" fill="#9CA3AF" font-size="9.5">TrustScorer</text>
  <text x="124" y="266" text-anchor="middle" fill="#9CA3AF" font-size="9.5">ApprovalService · AuditEnricher</text>

