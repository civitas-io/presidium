  <text x="288" y="192" text-anchor="middle" fill="#E5E7EB" font-size="12" font-weight="600">Defaults</text>
  <text x="288" y="210" text-anchor="middle" fill="#9CA3AF" font-size="9.5">CelPolicyEngine</text>
  <text x="288" y="224" text-anchor="middle" fill="#9CA3AF" font-size="9.5">InMemoryRegistry</text>
  <text x="288" y="238" text-anchor="middle" fill="#9CA3AF" font-size="9.5">EnvCredentialProvider</text>
