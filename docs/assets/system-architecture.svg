    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="520" fill="#111827" rx="10"/>

  <!-- External Consumers row -->
  <rect x="20" y="20" width="740" height="80" fill="#1F2937" rx="8" stroke="#374151" stroke-width="1"/>
  <text x="390" y="38" text-anchor="middle" fill="#9CA3AF" font-size="11" font-weight="500">External Consumers</text>
  <!-- Fiddler -->
  <rect x="50" y="46" width="130" height="40" fill="#374151" rx="6"/>
  <text x="115" y="71" text-anchor="middle" fill="#E5E7EB" font-size="13" font-weight="500">Fiddler</text>
  <!-- Arize -->
  <rect x="210" y="46" width="130" height="40" fill="#374151" rx="6"/>
  <text x="275" y="71" text-anchor="middle" fill="#E5E7EB" font-size="13" font-weight="500">Arize</text>
  <!-- Langfuse -->
