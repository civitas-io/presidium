  <rect x="50" y="376" width="680" height="40" fill="#1E3A5F" rx="6"/>
  <text x="390" y="391" text-anchor="middle" fill="#E5E7EB" font-size="11" font-weight="500">Runtime · Supervisor · MessageBus · AgentProcess · Registry · Transport</text>
  <text x="390" y="407" text-anchor="middle" fill="#9CA3AF" font-size="10">StateStore · OTEL · Plugins · AuditSink</text>

  <!-- Arrow: Civitas → Frameworks -->
  <line x1="390" y1="432" x2="390" y2="448" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Frameworks label + boxes -->
  <text x="390" y="462" text-anchor="middle" fill="#9CA3AF" font-size="10" font-weight="500">Agent Frameworks</text>
  <rect x="50" y="466" width="140" height="34" fill="#374151" rx="6"/>
  <text x="120" y="488" text-anchor="middle" fill="#E5E7EB" font-size="12">LangGraph</text>
  <rect x="210" y="466" width="140" height="34" fill="#374151" rx="6"/>
  <text x="280" y="488" text-anchor="middle" fill="#E5E7EB" font-size="12">CrewAI</text>
  <rect x="370" y="466" width="140" height="34" fill="#374151" rx="6"/>
  <text x="440" y="488" text-anchor="middle" fill="#E5E7EB" font-size="12">OpenAI SDK</text>
  <rect x="530" y="466" width="140" height="34" fill="#374151" rx="6"/>
  <text x="600" y="488" text-anchor="middle" fill="#E5E7EB" font-size="12">Custom</text>
