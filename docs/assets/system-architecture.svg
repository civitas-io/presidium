  <text x="488" y="210" text-anchor="middle" fill="#9CA3AF" font-size="9.5">OPA · Cedar</text>
  <text x="488" y="224" text-anchor="middle" fill="#9CA3AF" font-size="9.5">HashiCorp Vault</text>
  <text x="488" y="238" text-anchor="middle" fill="#9CA3AF" font-size="9.5">LiteLLM Proxy</text>
  <text x="488" y="252" text-anchor="middle" fill="#9CA3AF" font-size="9.5">Slack</text>
  <text x="488" y="266" text-anchor="middle" fill="#9CA3AF" font-size="9.5">Temporal</text>

