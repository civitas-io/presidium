  <text x="653" y="224" text-anchor="middle" fill="#9CA3AF" font-size="9.5">MCPGovernance</text>
  <text x="653" y="238" text-anchor="middle" fill="#9CA3AF" font-size="9.5">LearningTrustScorer</text>

