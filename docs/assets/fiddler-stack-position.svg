<svg viewBox="0 0 700 280" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="280" fill="#111827" rx="8"/>

  <!-- Top section label -->
  <text x="350" y="24" text-anchor="middle" fill="#9CA3AF" font-size="11" font-weight="500" letter-spacing="0.05em">STACK POSITION</text>

  <!-- Layer 1: Fiddler — gray border -->
  <rect x="40" y="36" width="620" height="54" rx="6" fill="#1F2937" stroke="#6B7280" stroke-width="1.5"/>
  <text x="60" y="57" fill="#9CA3AF" font-size="10" font-weight="700" letter-spacing="0.08em">OBSERVE &amp; PROTECT</text>
  <text x="60" y="73" fill="#E5E7EB" font-size="13" font-weight="600">Fiddler</text>
  <text x="200" y="73" fill="#9CA3AF" font-size="12">Trust Models · Guardrails · Dashboards</text>

  <!-- Layer 2: Presidium — purple border -->
  <rect x="40" y="102" width="620" height="54" rx="6" fill="#1F2937" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="60" y="123" fill="#A78BFA" font-size="10" font-weight="700" letter-spacing="0.08em">GOVERN &amp; ROUTE</text>
  <text x="60" y="139" fill="#E5E7EB" font-size="13" font-weight="600">Presidium</text>
  <text x="200" y="139" fill="#9CA3AF" font-size="12">Policy Engine · Registry · Gateways</text>

  <!-- Layer 3: Civitas — blue border -->
  <rect x="40" y="168" width="620" height="54" rx="6" fill="#1F2937" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="60" y="189" fill="#60A5FA" font-size="10" font-weight="700" letter-spacing="0.08em">RUN &amp; SURVIVE</text>
  <text x="60" y="205" fill="#E5E7EB" font-size="13" font-weight="600">Civitas</text>
  <text x="200" y="205" fill="#9CA3AF" font-size="12">Supervision · Messaging · Transport</text>

  <!-- Divider -->
  <line x1="40" y1="238" x2="660" y2="238" stroke="#374151" stroke-width="1"/>

  <!-- Pipeline flow section -->
  <!-- Presidium box -->
  <rect x="80" y="248" width="160" height="24" rx="6" fill="#4C1D95"/>
  <text x="160" y="264" text-anchor="middle" fill="#E5E7EB" font-size="11" font-weight="600">Presidium</text>

  <!-- Arrow -->
  <line x1="242" y1="260" x2="378" y2="260" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="310" y="254" text-anchor="middle" fill="#9CA3AF" font-size="10">OTEL + eval signals</text>

  <!-- Fiddler box -->
  <rect x="382" y="248" width="160" height="24" rx="6" fill="#374151"/>
  <text x="462" y="264" text-anchor="middle" fill="#E5E7EB" font-size="11" font-weight="600">Fiddler</text>

  <!-- Caption -->
  <text x="570" y="264" text-anchor="start" fill="#6B7280" font-size="10" font-style="italic">data source</text>
</svg>
