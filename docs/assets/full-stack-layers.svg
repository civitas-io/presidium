<svg viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9CA3AF"/>
    </marker>
    <marker id="arr-up" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto-start-reverse">
      <polygon points="0 0, 8 3, 0 6" fill="#9CA3AF"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#E5E7EB">The Full Stack</text>

  <!-- ═══ OBSERVE LAYER ═══ -->
  <rect x="50" y="45" width="600" height="65" rx="8" fill="#111827" stroke="#6B7280" stroke-width="1.5"/>
  <text x="80" y="68" font-size="12" font-weight="700" fill="#9CA3AF">OBSERVE</text>
  <text x="80" y="83" font-size="9" fill="#6B7280">Watch, analyze, alert</text>

  <rect x="200" y="55" width="80" height="30" rx="5" fill="#374151"/>
  <text x="240" y="74" text-anchor="middle" font-size="9" font-weight="600" fill="#D1D5DB">Fiddler</text>
  <rect x="290" y="55" width="80" height="30" rx="5" fill="#374151"/>
  <text x="330" y="74" text-anchor="middle" font-size="9" font-weight="600" fill="#D1D5DB">Arize</text>
  <rect x="380" y="55" width="80" height="30" rx="5" fill="#374151"/>
  <text x="420" y="74" text-anchor="middle" font-size="9" font-weight="600" fill="#D1D5DB">Langfuse</text>
  <rect x="470" y="55" width="80" height="30" rx="5" fill="#374151"/>
  <text x="510" y="74" text-anchor="middle" font-size="9" font-weight="600" fill="#D1D5DB">Datadog</text>
  <rect x="560" y="55" width="80" height="30" rx="5" fill="#374151"/>
  <text x="600" y="74" text-anchor="middle" font-size="9" font-weight="600" fill="#D1D5DB">Grafana</text>

  <!-- Arrow up -->
  <line x1="350" y1="118" x2="350" y2="112" stroke="#9CA3AF" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="370" y="118" font-size="7" fill="#6B7280">OTEL spans</text>

  <!-- ═══ GOVERN LAYER (Presidium) ═══ -->
  <rect x="50" y="120" width="600" height="100" rx="8" fill="#111827" stroke="#7C3AED" stroke-width="2"/>
  <text x="80" y="143" font-size="12" font-weight="700" fill="#A78BFA">GOVERN</text>
  <text x="80" y="158" font-size="9" fill="#7C3AED">Presidium</text>

  <!-- Presidium components -->
  <rect x="170" y="135" width="90" height="35" rx="5" fill="#4C1D95"/>
  <text x="215" y="150" text-anchor="middle" font-size="8" font-weight="600" fill="white">PolicyEngine</text>
  <text x="215" y="163" text-anchor="middle" font-size="7" fill="#DDD6FE">CEL / OPA</text>

  <rect x="270" y="135" width="90" height="35" rx="5" fill="#4C1D95"/>
  <text x="315" y="150" text-anchor="middle" font-size="8" font-weight="600" fill="white">AgentRegistry</text>
  <text x="315" y="163" text-anchor="middle" font-size="7" fill="#DDD6FE">grants + trust</text>

  <rect x="370" y="135" width="90" height="35" rx="5" fill="#4C1D95"/>
  <text x="415" y="150" text-anchor="middle" font-size="8" font-weight="600" fill="white">LLM Gateway</text>
  <text x="415" y="163" text-anchor="middle" font-size="7" fill="#DDD6FE">rate limits</text>

  <rect x="470" y="135" width="90" height="35" rx="5" fill="#4C1D95"/>
  <text x="515" y="150" text-anchor="middle" font-size="8" font-weight="600" fill="white">MCP Gateway</text>
  <text x="515" y="163" text-anchor="middle" font-size="7" fill="#DDD6FE">tool ACLs</text>

  <rect x="570" y="135" width="65" height="35" rx="5" fill="#4C1D95"/>
  <text x="602" y="150" text-anchor="middle" font-size="8" font-weight="600" fill="white">HITL</text>
  <text x="602" y="163" text-anchor="middle" font-size="7" fill="#DDD6FE">approval</text>

  <!-- Deployment mode labels -->
  <rect x="170" y="180" width="225" height="22" rx="4" fill="#1F2937"/>
  <text x="282" y="195" text-anchor="middle" font-size="8" fill="#A78BFA">Library mode: in-process, CEL, SQLite</text>
  <rect x="405" y="180" width="230" height="22" rx="4" fill="#1F2937"/>
  <text x="520" y="195" text-anchor="middle" font-size="8" fill="#A78BFA">Service mode: OPA, Vault, Postgres</text>

  <!-- Arrow down -->
  <line x1="350" y1="220" x2="350" y2="232" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="390" y="230" font-size="7" fill="#6B7280">extension hooks</text>

  <!-- ═══ RUN LAYER (Civitas) ═══ -->
  <rect x="50" y="235" width="600" height="85" rx="8" fill="#111827" stroke="#2563EB" stroke-width="2"/>
  <text x="80" y="258" font-size="12" font-weight="700" fill="#60A5FA">RUN</text>
  <text x="80" y="273" font-size="9" fill="#2563EB">Civitas</text>

  <!-- Civitas components -->
  <rect x="170" y="250" width="80" height="30" rx="5" fill="#1E3A5F"/>
  <text x="210" y="269" text-anchor="middle" font-size="8" font-weight="600" fill="white">Supervisor</text>
  <rect x="260" y="250" width="80" height="30" rx="5" fill="#1E3A5F"/>
  <text x="300" y="269" text-anchor="middle" font-size="8" font-weight="600" fill="white">MessageBus</text>
  <rect x="350" y="250" width="80" height="30" rx="5" fill="#1E3A5F"/>
  <text x="390" y="269" text-anchor="middle" font-size="8" font-weight="600" fill="white">Transport</text>
  <rect x="440" y="250" width="80" height="30" rx="5" fill="#1E3A5F"/>
  <text x="480" y="269" text-anchor="middle" font-size="8" font-weight="600" fill="white">StateStore</text>
  <rect x="530" y="250" width="55" height="30" rx="5" fill="#1E3A5F"/>
  <text x="557" y="269" text-anchor="middle" font-size="8" font-weight="600" fill="white">OTEL</text>
  <rect x="595" y="250" width="45" height="30" rx="5" fill="#1E3A5F"/>
  <text x="617" y="269" text-anchor="middle" font-size="8" font-weight="600" fill="white">Eval</text>

  <text x="350" y="303" text-anchor="middle" font-size="8" fill="#60A5FA">InProcess -> ZMQ -> NATS (scaling ladder)</text>

  <!-- ═══ FRAMEWORK LAYER ═══ -->
  <rect x="50" y="330" width="600" height="42" rx="8" fill="#111827" stroke="#6B7280" stroke-width="1"/>
  <text x="80" y="355" font-size="10" font-weight="700" fill="#6B7280">REASON</text>
  <rect x="180" y="338" width="80" height="26" rx="4" fill="#374151"/>
  <text x="220" y="355" text-anchor="middle" font-size="8" fill="#D1D5DB">LangGraph</text>
  <rect x="270" y="338" width="80" height="26" rx="4" fill="#374151"/>
  <text x="310" y="355" text-anchor="middle" font-size="8" fill="#D1D5DB">CrewAI</text>
  <rect x="360" y="338" width="80" height="26" rx="4" fill="#374151"/>
  <text x="400" y="355" text-anchor="middle" font-size="8" fill="#D1D5DB">OpenAI SDK</text>
  <rect x="450" y="338" width="80" height="26" rx="4" fill="#374151"/>
  <text x="490" y="355" text-anchor="middle" font-size="8" fill="#D1D5DB">Custom</text>
</svg>