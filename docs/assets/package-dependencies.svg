<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 305" width="720" height="305"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9CA3AF"/>
    </marker>
  </defs>

  <!-- SDK (top) -->
  <rect x="260" y="20" width="200" height="42" rx="7"
        fill="#F59E0B" stroke="#D97706" stroke-width="2"/>
  <text x="360" y="37" text-anchor="middle" font-size="12" font-weight="700" fill="white">presidium-sdk</text>
  <text x="360" y="53" text-anchor="middle" font-size="9" fill="#FEF3C7">unified developer API</text>

  <!-- Middle row: audit, llm-gateway, mcp-gateway, policy -->
  <!-- audit: x=30 -->
  <rect x="20" y="130" width="155" height="42" rx="6" fill="white" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="97" y="147" text-anchor="middle" font-size="10.5" font-weight="700" fill="#78350F">presidium-audit</text>
  <text x="97" y="162" text-anchor="middle" font-size="8.5" fill="#92400E">metrics · compliance</text>

  <!-- llm-gateway: x=195 -->
  <rect x="192" y="130" width="160" height="42" rx="6" fill="white" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="272" y="147" text-anchor="middle" font-size="10.5" font-weight="700" fill="#78350F">presidium-llm-gateway</text>
  <text x="272" y="162" text-anchor="middle" font-size="8.5" fill="#92400E">rate limits · budgets</text>

  <!-- mcp-gateway: x=370 -->
  <rect x="368" y="130" width="165" height="42" rx="6" fill="white" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="450" y="147" text-anchor="middle" font-size="10.5" font-weight="700" fill="#78350F">presidium-mcp-gateway</text>
  <text x="450" y="162" text-anchor="middle" font-size="8.5" fill="#92400E">tool ACLs · OAuth 2.1</text>

  <!-- policy: x=550 -->
  <rect x="549" y="130" width="155" height="42" rx="6" fill="white" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="626" y="147" text-anchor="middle" font-size="10.5" font-weight="700" fill="#78350F">presidium-policy</text>
  <text x="626" y="162" text-anchor="middle" font-size="8.5" fill="#92400E">Cedar · OPA · YAML</text>

  <!-- Registry (bottom, centered, more prominent) -->
  <rect x="255" y="245" width="210" height="42" rx="7"
        fill="white" stroke="#F59E0B" stroke-width="2.5"/>
  <text x="360" y="262" text-anchor="middle" font-size="11" font-weight="700" fill="#78350F">presidium-registry</text>
  <text x="360" y="277" text-anchor="middle" font-size="8.5" fill="#92400E">identity · grants · credentials · trust</text>

  <!-- Arrows: SDK → middle packages -->
  <line x1="330" y1="62" x2="120" y2="130" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="345" y1="62" x2="270" y2="130" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="375" y1="62" x2="450" y2="130" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="390" y1="62" x2="625" y2="130" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrows: middle packages → registry -->
  <line x1="97" y1="172" x2="295" y2="245" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="272" y1="172" x2="332" y2="245" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="172" x2="390" y2="245" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="626" y1="172" x2="430" y2="245" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- policy → registry (also shows within-layer dep) -->
  <!-- already drawn above -->

  <!-- audit → policy (dashed, same-layer dep) -->
  <line x1="175" y1="151" x2="549" y2="151" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4,3"
        marker-end="url(#arr)"/>
  <text x="362" y="147" text-anchor="middle" font-size="7.5" fill="#9CA3AF">also depends on policy</text>

</svg>
