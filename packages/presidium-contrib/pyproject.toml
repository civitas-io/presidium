[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "presidium-contrib"
version = "0.1.0"
description = "Adapters and reference implementations for Presidium governance"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.12"
keywords = ["agents", "governance", "adapters", "presidium", "civitas"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Framework :: AsyncIO",
    "Typing :: Typed",
]
dependencies = [
    "presidium>=0.1",
]

[project.optional-dependencies]
opa = ["httpx>=0.27"]
openbao = ["hvac>=2.0"]
agentgateway = ["httpx>=0.27"]
slack = ["slack-sdk>=3.27", "aiohttp>=3.9"]
webhook = ["httpx>=0.27"]
postgres = ["asyncpg>=0.29"]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5",
    "ruff>=0.4",
    "mypy>=1.10",
    "httpx>=0.27",
]

[tool.hatch.build.targets.wheel]
packages = ["src/presidium_contrib"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--cov=presidium_contrib --cov-report=term-missing"

[tool.coverage.run]
branch = true
source = ["presidium_contrib"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "@overload",
    "^\\s+\\.\\.\\.$",
]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "ASYNC"]

[tool.ruff.lint.isort]
known-first-party = ["presidium_contrib", "presidium"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = false
disallow_untyped_defs = true
warn_return_any = true

[[tool.mypy.overrides]]
module = ["civitas", "civitas.*", "celpy", "celpy.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["hvac", "hvac.*", "slack_sdk", "slack_sdk.*", "asyncpg", "asyncpg.*"]
ignore_missing_imports = true
