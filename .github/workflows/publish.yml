name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"
      - "contrib-v*.*.*"

jobs:
  build-presidium:
    name: Build presidium
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(grep '^version' packages/presidium/pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package version ($PKG_VERSION)"
            exit 1
          fi

      - name: Build wheel and sdist
        run: uv build
        working-directory: packages/presidium

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-presidium
          path: packages/presidium/dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  build-contrib:
    name: Build presidium-contrib
    if: startsWith(github.ref, 'refs/tags/contrib-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/contrib-v}"
          PKG_VERSION=$(grep '^version' packages/presidium-contrib/pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package version ($PKG_VERSION)"
            exit 1
          fi

      - name: Build wheel and sdist
        run: uv build
        working-directory: packages/presidium-contrib

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-contrib
          path: packages/presidium-contrib/dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  publish-presidium:
    name: Publish presidium to PyPI
    needs: build-presidium
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/presidium
    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-presidium
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-contrib:
    name: Publish presidium-contrib to PyPI
    needs: build-contrib
    if: startsWith(github.ref, 'refs/tags/contrib-v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/presidium-contrib
    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-contrib
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
