name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test-presidium:
    name: presidium (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --package presidium

      - name: Run tests
        run: uv run --package presidium pytest packages/presidium/tests/

  test-contrib:
    name: presidium-contrib (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --package presidium --package presidium-contrib

      - name: Run tests
        run: uv run --package presidium-contrib pytest packages/presidium-contrib/tests/

  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install all packages
        run: uv sync --all-extras --package presidium --package presidium-contrib

      - name: Ruff lint (presidium)
        run: uv run ruff check packages/presidium/src/ packages/presidium/tests/

      - name: Ruff format check (presidium)
        run: uv run ruff format --check packages/presidium/src/ packages/presidium/tests/

      - name: Ruff lint (presidium-contrib)
        run: uv run ruff check packages/presidium-contrib/src/ packages/presidium-contrib/tests/

      - name: Ruff format check (presidium-contrib)
        run: uv run ruff format --check packages/presidium-contrib/src/ packages/presidium-contrib/tests/

      - name: mypy (presidium)
        run: cd packages/presidium && uv run mypy src/presidium/

      - name: mypy (presidium-contrib)
        run: cd packages/presidium-contrib && uv run mypy src/presidium_contrib/
